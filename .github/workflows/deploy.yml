name: Deploy to ECR

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to Both Repos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          # 1. Build the image once (it contains both scripts)
          docker build -t common-image .

          # 2. Tag and Push for Scene Generation
          docker tag common-image $ECR_REGISTRY/bedrock-scene-generation:$IMAGE_TAG
          docker push $ECR_REGISTRY/bedrock-scene-generation:$IMAGE_TAG

          # 3. Tag and Push for Image Generation
          docker tag common-image $ECR_REGISTRY/bedrock-image-generation:$IMAGE_TAG
          docker push $ECR_REGISTRY/bedrock-image-generation:$IMAGE_TAG
